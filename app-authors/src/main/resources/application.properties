spring.application.name=app-authors

# Datasource PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/distribuidaG
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Metricas
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true

# JPA / Hibernate
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Puerto del servidor
server.port=8080

# Configuración de Consul
spring.cloud.consul.host=127.0.0.1
spring.cloud.consul.port=8500

# Circuit Breaker
resilience4j.circuitbreaker.instances.authorsCb.slidingWindowSize=10
resilience4j.circuitbreaker.instances.authorsCb.failureRateThreshold=50
resilience4j.circuitbreaker.instances.authorsCb.waitDurationInOpenState=10s

# Retry
resilience4j.retry.instances.authorsRetry.maxAttempts=3
resilience4j.retry.instances.authorsRetry.waitDuration=500ms
